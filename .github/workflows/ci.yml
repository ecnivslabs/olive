name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'windows-latest' && 'x86_64-pc-windows-msvc' || '' }}

      - name: Get rustc host triple
        id: rustc-host
        shell: bash
        run: echo "triple=$(rustc -vV | sed -n 's/host: //p')" >> "$GITHUB_OUTPUT"

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-${{ steps.rustc-host.outputs.triple }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ steps.rustc-host.outputs.triple }}-cargo-test-

      - name: Build workspace
        # Kept separate from `cargo test`: pipelined compilation can start test
        # binaries before olive_std's .so/.a finish linking on a cold cache.
        run: cargo build --workspace

      - name: Run tests
        run: cargo test --workspace
        env:
          # cranelift's ISLE-generated lowering is deeply nested and mostly
          # uninlined in debug builds; MSVC debug frames are large enough
          # that Windows' 1MiB default thread stack isn't enough headroom.
          RUST_MIN_STACK: "16777216"
